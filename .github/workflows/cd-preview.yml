# RestEasy — CD Pipeline: Preview Builds
# Triggered on push to develop branch
# Builds an internal APK/IPA and runs Maestro E2E tests

name: CD — Preview

on:
  push:
    branches: [develop]

concurrency:
  group: cd-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── EAS Preview Build ──────────────────────────────────────────────────────
  build-preview:
    name: EAS Preview Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (preview — Android APK)
        id: build
        run: |
          BUILD_URL=$(eas build --platform android --profile preview --non-interactive --json | jq -r '.[0].artifacts.buildUrl')
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_STAGING }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_STAGING }}
          EXPO_PUBLIC_RC_API_KEY_ANDROID: ${{ secrets.EXPO_PUBLIC_RC_API_KEY_ANDROID }}
          EXPO_PUBLIC_POSTHOG_API_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_API_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}

      - name: Post build URL to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📱 **Preview Build ready!**\n\n[Download APK](${{ steps.build.outputs.build_url }})`
            })

  # ── Maestro E2E Tests ──────────────────────────────────────────────────────
  e2e-tests:
    name: Maestro E2E Tests
    runs-on: ubuntu-latest
    needs: build-preview
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Setup Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          script: |
            # Download and install the preview APK
            curl -L "${{ needs.build-preview.outputs.build_url }}" -o resteasy-preview.apk
            adb install resteasy-preview.apk
            
            # Run Maestro flows
            maestro test .maestro/flows/01_onboarding.yaml
            maestro test .maestro/flows/02_morning_journal.yaml
            maestro test .maestro/flows/03_night_mode.yaml

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots-${{ github.sha }}
          path: .maestro/screenshots/
          retention-days: 14
