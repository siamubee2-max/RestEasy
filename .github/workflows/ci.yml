name: CI

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
    branches: [main, master]

jobs:
  lint-typecheck-test:
    name: Lint · TypeCheck · Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci --coverage --coverageReporters=lcov
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: placeholder
          EXPO_PUBLIC_RC_API_KEY_IOS: placeholder
          EXPO_PUBLIC_RC_API_KEY_ANDROID: placeholder
          EXPO_PUBLIC_POSTHOG_API_KEY: placeholder
          EXPO_PUBLIC_POSTHOG_HOST: https://eu.posthog.com
          EXPO_PUBLIC_SENTRY_DSN: https://placeholder@placeholder.ingest.sentry.io/0
